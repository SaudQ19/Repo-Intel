services:
  # 1. Backend Web Service (FastAPI)
  - type: web
    name: repointel-backend
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: repointel-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: GITHUB_PERSONAL_ACCESS_TOKEN
        sync: false

  # 2. Frontend Static Site (React/Vite)
  - type: web
    name: repointel-frontend
    env: static
    buildCommand: npm run build
    publishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: repointel-backend
          property: host

databases:
  # 3. Managed PostgreSQL Database (pgvector supported natively on Render)
  - name: repointel-db
    plan: free
    postgresMajorVersion: "15"
