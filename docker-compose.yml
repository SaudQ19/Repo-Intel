version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: repo_intel_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: repo_intel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repo_intel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_ENV=development
    container_name: repo_intel_api
    command: /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=repo_intel_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
      - DEMO_MODE=false
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:18-alpine
    container_name: repo_intel_frontend
    working_dir: /app/frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  pgdata:
